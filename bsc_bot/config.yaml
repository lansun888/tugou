analyzer:
  check_honeypot: true
  check_renounced: true
  check_verified: true
mode: simulation
monitor:
  competition_threshold: 3
  dex_enabled:
    biswap: true
    pancakeswap_v2: true
    pancakeswap_v3: true
  enable_new_token_sniping: true
  enable_whale_watching: true
  min_liquidity_bnb: 10
  min_security_score: 85
  observation_wait_time: 30
  quick_observe_time: 5
network:
  chain_id: 56
  name: BSC Mainnet
  nodes:
    execute:
    - https://bsc-dataseed1.defibit.io
    - https://bsc-dataseed2.defibit.io
    - https://bsc-dataseed1.ninicoin.io
    - https://bsc.publicnode.com
    - https://bsc-dataseed1.binance.org
    - https://binance.ankr.com/bsc
    - https://rpc.ankr.com/bsc
    - https://bsc-mainnet.nodereal.io/v1/64a9df0874fb4a93b9d0a3849de012d3
    - https://1rpc.io/bnb
    primary: https://bsc-dataseed1.binance.org
  polling_interval: 1
  ws_node: "wss://bsc-mainnet.nodereal.io/ws/v1/64a9df0874fb4a93b9d0a3849de012d3"
  proxy:
    enabled: true
    http: "http://127.0.0.1:10809"
    socks5: "socks5://127.0.0.1:10808"
  # 哪些模块需要走代理
  proxy_required:
    - dexscreener
    - coingecko
    - okx
  # 哪些模块直连（不走代理）
  direct_connect:
    - bsc_nodes
    - bscscan
    - honeypot
    - goplus
  private_rpcs:
  - https://bsc.publicnode.com
  - https://bsc-mainnet.nodereal.io/v1/64a9df0874fb4a93b9d0a3849de012d3
  - https://bsc-dataseed1.binance.org
  - https://bsc-dataseed2.binance.org
  - https://bsc-dataseed3.binance.org
  - https://1rpc.io/bnb
  test_mode: true
  tx_timeout: 120
notifications:
  enable_telegram: false
  telegram_chat_id: ''
  telegram_token: ''
position_management:
  daily_risk:
    max_daily_loss: 0.5
    profit_threshold_conservative: 1
  max_concurrent_positions: 5
  max_holder_concentration: 30
  min_liquidity_bnb: 10
  min_security_score: 85
  monitor_interval: 20
  observation_wait_time: 300
  require_lp_locked: false
  take_profit:
    levels:
    - - 100
      - 25
    - - 200
      - 25
    - - 400
      - 25
    - - 900
      - 15
  time_stop:
    rules:
    - - 6
      - 20
      - 50
    - - 24
      - 50
      - 100
    - - 72
      - -999
      - 100
  trailing_stop:
    initial_stop_loss: 50
    levels:
    - - 2
      - 50
    - - 3
      - 150
    - - 5
      - 300
    - - 10
      - 700
    pullback_threshold: 40
trading:
  buy_amount: 0.1
  deadline_seconds: 45
  gas:
    default_limit: 300000
    frontrun_multiplier: 1.5
    mode: normal
    normal_multiplier: 1.15
  slippage: 12
  slippage_alert_threshold: 15
  stop_loss_percentage: -20
  take_profit_percentage: 50
