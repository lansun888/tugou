analyzer:
  check_honeypot: true
  check_renounced: true
  check_verified: true
mode: simulation
monitor:
  competition_threshold: 3
  dex_enabled:
    biswap: true
    pancakeswap_v2: true
    pancakeswap_v3: true
    four_meme: false          # four.meme TokenCreate 监听开关，false=关闭
  enable_new_token_sniping: true
  enable_whale_watching: true
  min_liquidity_bnb: 10
  min_security_score: 85
  observation_wait_time: 30
  quick_observe_time: 1       # 观察等待(秒)，设为0直接跳过。降低此值可更早买入，但减少价格/流动性观察窗口
network:
  chain_id: 56
  direct_connect:
  - bsc_nodes
  - bscscan
  - honeypot
  - goplus
  name: BSC Mainnet
  nodes:
    execute:
    - https://bsc-rpc.publicnode.com
    - https://1rpc.io/bnb
    - https://rpc.ankr.com/bsc
    - https://binance.llamarpc.com
    - https://bsc-dataseed1.binance.org
    - https://bsc-dataseed2.binance.org
    primary: https://bsc-rpc.publicnode.com
  polling_interval: 1
  private_rpcs:
  - https://bsc-rpc.publicnode.com
  - https://1rpc.io/bnb
  - https://rpc.ankr.com/bsc
  proxy:
    enabled: true
    http: http://127.0.0.1:10809
    socks5: socks5://127.0.0.1:10808
  proxy_required:
  - dexscreener
  - coingecko
  - okx
  test_mode: true
  tx_timeout: 120
  ws_node: wss://bsc-mainnet.nodereal.io/ws/v1/64a9df0874fb4a93b9d0a3849de012d3
notifications:
  enable_telegram: false
  telegram_chat_id: ''
  telegram_token: ''
position_management:
  daily_risk:
    max_daily_loss: 1
    profit_threshold_conservative: 1
  max_concurrent_positions: 5
  max_holder_concentration: 30
  min_liquidity_bnb: 10
  min_security_score: 85
  monitor_interval: 20
  observation_wait_time: 300
  require_lp_locked: false
  take_profit:
    levels:
    - - 100
      - 25
    - - 200
      - 25
    - - 400
      - 25
    - - 900
      - 15
  time_stop:
    rules:
    - - 6
      - 20
      - 50
    - - 24
      - 50
      - 100
    - - 72
      - -999
      - 100
  trailing_stop:
    initial_stop_loss: 35
    levels:
    - - 2
      - 50
    - - 3
      - 150
    - - 5
      - 300
    - - 10
      - 700
    pullback_threshold: 40
trading:
  buy_amount: 0.1
  deadline_seconds: 45

four_meme:
  enabled: false              # 总开关，false=关闭所有 four.meme 功能
  contract: "0x5c952063c7fc8610FFDB798152D69F0B9550762b"
  min_score: 75
  buy_amount: 0.05
  min_liquidity: 3
  skip_observation: true
  pre_analyze: true
  skip_checks:
    - liquidity_locked
    - deployer_source
  gas:
    default_limit: 300000
    frontrun_multiplier: 1.5
    mode: normal
  near_graduation:
    enabled: false          # 设为 true 开启近毕业抢买
    trigger_pct: 80         # 募资达到 80% 触发
    buy_amount: 0.03        # 比正常买入少（风险控制）
    poll_interval: 15       # 每 15 秒轮询一次
    max_wait_minutes: 10    # 超过 10 分钟未毕业则放弃
    normal_multiplier: 1.15
  initial_stop_loss: -35
  protection_period_minutes: 2
  quick_stop_threshold: -20
  slippage: 12
  slippage_alert_threshold: 15
  stop_loss_percentage: -20
  take_profit_percentage: 50
